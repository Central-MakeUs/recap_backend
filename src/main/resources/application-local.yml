spring:
  h2:
    console:
      enabled: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:recap
    username: sa
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    syntax-highlight:
      theme: nord
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

swagger:
  server:
    url: http://localhost:8080

jwt:
  secret: ${JWT_SECRET:local-dev-only-jwt-secret-please-do-not-use-in-prod-32b}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:30m}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:14d}

apple:
  bundle-id: ${APPLE_BUNDLE_ID:com.cmc.recap}